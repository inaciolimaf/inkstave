# Inkstave reverse-proxy — main nginx config (spec 56).
# http-context directives; the server block lives in conf.d/default.conf.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Don't advertise the nginx version (spec 52 surface reduction).
    server_tokens off;

    # Compress text assets; hashed JS/CSS/JSON dominate the SPA payload.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    access_log /var/log/nginx/access.log;

    include /etc/nginx/conf.d/*.conf;
}
