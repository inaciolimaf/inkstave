# Inkstave reverse proxy — server block (spec 56).
#
# Routes:  / → SPA (static)  ·  /api → backend  ·  /ws → backend (collab is
# in-app, so /ws also targets `backend`; see docs/adr/0056)  ·  /metrics → blocked.
# TLS is the operator's concern: terminate it in front of this :80 listener.

server {
    listen 80;
    server_name _;

    # Security headers the static SPA responses should carry (the backend sets
    # its own on /api responses — see spec 52 — so we don't duplicate them there).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # CSP placeholder — operator-tunable; tighten per deployment.
    # add_header Content-Security-Policy "default-src 'self'" always;

    # Proxy liveness: 200 with no upstream (used by the image HEALTHCHECK).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Internal metrics are never exposed publicly (spec 51/56 AC6): blocked here,
    # not proxied to any upstream.
    location /metrics {
        return 404;
    }

    # REST API → backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;   # binary uploads (spec 14)
        proxy_read_timeout 65s;
    }

    # Collab WebSocket → backend (collab is mounted in the FastAPI app). The
    # Upgrade/Connection headers + HTTP/1.1 keep the socket open; long timeouts
    # suit live-editing sessions.
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static SPA: long-cache the hashed assets, never cache index.html, and fall
    # back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        root /usr/share/nginx/html;
        # Assets are content-hashed (safe to cache long), but a few hours keeps a
        # bad cached response (e.g. a wrong MIME) from sticking — no `immutable`,
        # so a normal refresh can revalidate. Tune the window as needed.
        expires 4h;
    }
}
