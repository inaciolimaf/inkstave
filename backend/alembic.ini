# Alembic configuration for the Inkstave backend.
#
# The database URL is NOT set here — env.py reads it from application settings
# (DATABASE_URL) and normalizes it to the async driver. Run via the justfile:
#   just migrate            # upgrade head
#   just makemigration name="add widgets"
#   just downgrade          # downgrade -1

[alembic]
# Resolved relative to this file so it works from any working directory.
script_location = %(here)s/migrations
# Make `import inkstave` work when Alembic loads env.py.
prepend_sys_path = %(here)s/src
# Use OS path separators and a clear version filename template.
path_separator = os
version_path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
